[pytest]
# Use the `loadgroup` distribution so @pytest.mark.xdist_group(name=...) is
# honored: tests in the same group are routed to the same worker, which is
# how we serialize tests that touch shared mutable resources (e.g. the
# RabbitMQ `orders` queue) without losing parallelism elsewhere.
addopts = --dist=loadgroup
asyncio_mode = strict
markers =
    cloud: tests that hit real Azure cloud services (skipped unless AZURE_CLOUD_TESTS=1)
