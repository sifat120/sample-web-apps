# =============================================================
# docker-compose.yml — Local development environment
#
# Starts all five backing services on your machine.
# Run:  docker compose up -d
# Stop: docker compose down
# Wipe data volumes: docker compose down -v
#
# Each service section includes a comment showing the hosted
# (cloud) equivalent used in production. The recommended cloud
# is Microsoft Azure; alternative providers are also listed.
# =============================================================

services:

  # -----------------------------------------------------------
  # PostgreSQL — primary relational database
  #
  # Hosted alternatives:
  #   Azure Database for PostgreSQL — Flexible Server:
  #     POSTGRES_URL=postgresql+asyncpg://<user>:<pass>@<server>.postgres.database.azure.com:5432/ecommerce?ssl=require
  #   Google Cloud SQL: POSTGRES_URL=postgresql+asyncpg://user:pass@<cloudsql-ip>:5432/ecommerce
  #   Supabase:         POSTGRES_URL=postgresql+asyncpg://postgres:<pass>@db.<project>.supabase.co:5432/postgres
  #   Neon (serverless): POSTGRES_URL=postgresql+asyncpg://user:pass@<neon-host>/ecommerce?sslmode=require
  # -----------------------------------------------------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      # Persist data across restarts so you don't lose seed data on every `docker compose down`
      - postgres_data:/var/lib/postgresql/data
      # Run init.sql automatically on first start to create tables and seed data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Valkey — in-memory cache, session store, and rate limiter
  #
  # Valkey is a community-maintained, BSD-licensed fork of Redis,
  # created after Redis changed to a non-open-source license in 2024.
  # It is 100% protocol-compatible — all Redis clients (including
  # redis-py) work with Valkey unchanged.
  #
  # Hosted alternatives:
  #   Azure Cache for Redis (TLS on port 6380):
  #     REDIS_URL=rediss://<user>:<access-key>@<name>.redis.cache.windows.net:6380
  #   Upstash (Redis-compatible): REDIS_URL=rediss://default:<token>@<host>.upstash.io:6379
  #   Aiven for Valkey:           REDIS_URL=rediss://default:<pass>@<host>.aivencloud.com:PORT
  # -----------------------------------------------------------
  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Elasticsearch — product search engine
  #
  # ES_JAVA_OPTS limits heap memory so it doesn't consume all RAM locally.
  # xpack.security.enabled=false skips TLS/auth for local development.
  #
  # Hosted alternatives:
  #   Elastic Cloud on Azure (via the Azure Marketplace):
  #     ELASTICSEARCH_URL=https://<deployment>.es.<region>.azure.elastic-cloud.com:9243
  #     ES_USERNAME=elastic / ES_PASSWORD=...   (or ES_API_KEY=...)
  #   Bonsai (managed): ELASTICSEARCH_URL=https://<host>.bonsaisearch.net
  #                     ES_USERNAME=... / ES_PASSWORD=...
  #
  # Note: Azure does not offer a first-party managed Elasticsearch.
  # Elastic Cloud on Azure runs on Azure infrastructure and is the
  # closest "Microsoft-cloud-hosted" option.
  # -----------------------------------------------------------
  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10

  # -----------------------------------------------------------
  # Azurite — local Azure Blob Storage emulator for product images
  #
  # Azurite is Microsoft's official emulator for the Azure Blob,
  # Queue, and Table services. The same azure-storage-blob SDK
  # works against Azurite locally and against real Azure Blob
  # Storage in production with only a connection-string change.
  #
  # Port 10000: Blob service (used by the app)
  # Port 10001: Queue service (unused here, exposed for completeness)
  # Port 10002: Table service (unused here, exposed for completeness)
  #
  # Hosted alternatives:
  #   Azure Blob Storage (production):
  #     AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=...;AccountKey=...;EndpointSuffix=core.windows.net
  # -----------------------------------------------------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data"
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # RabbitMQ — message queue for async post-order tasks
  #
  # Port 5672:  AMQP protocol (used by the app and worker)
  # Port 15672: Management web UI — open http://localhost:15672
  #             to browse queues and messages (login: guest/guest)
  #
  # Hosted alternatives:
  #   CloudAMQP (managed RabbitMQ; available as an Azure Marketplace plan):
  #     RABBITMQ_URL=amqps://user:pass@<host>.cloudamqp.com/vhost
  #   Self-host on Azure Kubernetes Service (AKS) using the Bitnami chart.
  #
  # Note: Azure Service Bus is not AMQP 0-9-1 compatible with aio_pika
  # in the way RabbitMQ is — switching to it would require rewriting
  # queue.py and order_worker.py with the azure-servicebus SDK.
  # -----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  azurite_data:
